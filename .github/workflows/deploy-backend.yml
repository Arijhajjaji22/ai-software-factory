name: DÈploiement Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  ACR_NAME: aisfacrhp2026
  IMAGE_NAME: aisf-api
  RESOURCE_GROUP: rg-aisf-france
  CONTAINER_APP: aisf-api-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: RÈcupÈrer le code
        uses: actions/checkout@v4

      - name: Connexion ‡ Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Connexion ‡ Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Builder l'image Docker
        working-directory: ./backend
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                        -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
                        -f Dockerfile .

      - name: Pousser l'image vers l'ACR
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Mettre ‡ jour le Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}